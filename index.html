  html,body{background:var(--bg);color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;overscroll-behavior-y:none;}
  body{min-height:100vh;
    background:
      radial-gradient(120% 60% at 50% -10%, rgba(193,39,45,.10), transparent 60%),
      radial-gradient(90% 50% at 50% 120%, rgba(60,60,80,.06), transparent 60%),
      var(--bg);
    padding-bottom:60px;}
  .wrap{max-width:620px;margin:0 auto;padding:0 16px;}
  .mono{font-variant-numeric:tabular-nums;font-feature-settings:"tnum";}
  .up{text-transform:uppercase;letter-spacing:.14em;}

  header{position:sticky;top:0;z-index:30;
    background:linear-gradient(180deg, rgba(10,10,12,.97), rgba(10,10,12,.82));
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    border-bottom:1px solid var(--line);padding-top:env(safe-area-inset-top);}
  .htop{display:flex;align-items:center;justify-content:space-between;padding:14px 0 12px;}
  .brand{display:flex;align-items:center;gap:11px;}
  .sig{width:30px;height:30px;border-radius:7px;flex:none;
    background:var(--logo) center/76% no-repeat, linear-gradient(145deg,var(--accent),#7d1519);
    box-shadow:0 0 16px var(--glow), inset 0 1px 1px rgba(255,255,255,.18);
    display:grid;place-items:center;color:#fff;font-weight:800;font-size:14px;}
  .brand h1{font-size:16px;font-weight:800;letter-spacing:.20em;}
  .brand .sub{font-size:9px;color:var(--dim);letter-spacing:.28em;margin-top:2px;}
  .gear{width:38px;height:38px;border-radius:9px;border:1px solid var(--line2);
    background:var(--card);color:var(--dim);display:grid;place-items:center;font-size:17px;cursor:pointer;}
  .gear:active{background:var(--card2);}

  .weeks{display:flex;gap:7px;overflow-x:auto;padding:0 0 12px;scrollbar-width:none;}
  .weeks::-webkit-scrollbar{display:none;}
  .wk{flex:none;min-width:54px;padding:8px 10px;border-radius:10px;border:1px solid var(--line);
    background:var(--card);text-align:center;cursor:pointer;transition:.15s;}
  .wk .n{font-size:15px;font-weight:800;}
  .wk .l{font-size:8px;color:var(--dim);letter-spacing:.1em;margin-top:2px;text-transform:uppercase;}
  .wk.on{border-color:var(--accent);background:linear-gradient(180deg,rgba(193,39,45,.22),rgba(193,39,45,.06));
    box-shadow:0 0 0 1px var(--accent) inset, 0 4px 18px -6px var(--glow);}
  .wk.on .l{color:var(--accent2);}

  .days{display:flex;gap:7px;overflow-x:auto;padding:12px 0;scrollbar-width:none;}
  .days::-webkit-scrollbar{display:none;}
  .day{flex:none;padding:8px 13px;border-radius:20px;border:1px solid var(--line);
    background:var(--card);cursor:pointer;font-size:12px;font-weight:700;color:var(--dim);
    letter-spacing:.08em;white-space:nowrap;transition:.15s;position:relative;}
  .day.on{color:var(--txt);border-color:var(--line2);background:var(--card2);}
  .day.today::after{content:"";position:absolute;top:5px;right:7px;width:6px;height:6px;border-radius:50%;
    background:var(--accent2);box-shadow:0 0 6px var(--accent2);}

  .dhead{margin:6px 0 16px;}
  .dhead .date{font-size:11px;color:var(--accent2);letter-spacing:.18em;font-weight:700;text-transform:uppercase;}
  .dhead .todaytag{display:inline-block;margin-left:8px;font-size:9px;background:var(--accent);color:#fff;
    padding:2px 7px;border-radius:20px;letter-spacing:.14em;vertical-align:middle;}
  .dhead h2{font-size:26px;font-weight:800;margin-top:6px;letter-spacing:.01em;}
  .dhead .dsub{font-size:13px;color:var(--dim);margin-top:3px;}
  .phase{font-size:10px;color:var(--dim2);letter-spacing:.16em;margin-top:9px;text-transform:uppercase;
    display:flex;align-items:center;gap:8px;}
  .phase:before{content:"";height:1px;width:16px;background:var(--line2);}

  .grouplbl{font-size:10px;color:var(--dim);letter-spacing:.2em;margin:22px 2px 9px;font-weight:700;
    display:flex;align-items:center;gap:9px;text-transform:uppercase;}
  .grouplbl.str{color:var(--accent2);}
  .grouplbl:after{content:"";flex:1;height:1px;background:var(--line);}

  .ex{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:13px 14px;margin-bottom:9px;
    transition:.15s;position:relative;overflow:hidden;}
  .ex.str{background:linear-gradient(180deg,var(--card2),var(--card));border-color:#3a2427;}
  .ex.str:before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;
    background:linear-gradient(var(--accent),#7d1519);}
  .ex.done{opacity:.5;}
  .ex.done .exname{text-decoration:line-through;}
  .exrow{display:flex;align-items:flex-start;gap:12px;}
  .chk{width:24px;height:24px;border-radius:7px;border:1.5px solid var(--line2);flex:none;margin-top:1px;
    background:var(--bg2);cursor:pointer;display:grid;place-items:center;color:transparent;font-size:14px;font-weight:800;transition:.15s;}
  .chk.on{background:var(--ok);border-color:var(--ok);color:#07120d;}
  .exmain{flex:1;min-width:0;}
  .exname{font-size:15px;font-weight:700;line-height:1.25;}
  .exname .badge{font-size:8px;background:var(--accent);color:#fff;padding:2px 6px;border-radius:5px;
    letter-spacing:.12em;margin-left:7px;vertical-align:middle;font-weight:800;}
  .exdetail{font-size:12.5px;color:var(--dim);margin-top:4px;}
  .exnote{font-size:11.5px;color:var(--dim2);margin-top:7px;line-height:1.5;
    border-left:2px solid var(--line2);padding-left:9px;}
  .edit{width:30px;height:30px;flex:none;border-radius:8px;border:1px solid transparent;
    background:transparent;color:var(--dim2);display:grid;place-items:center;font-size:14px;cursor:pointer;}
  .edit:active{background:var(--card2);}

  .sets{display:flex;flex-wrap:wrap;gap:7px;margin-top:9px;}
  .set{background:var(--bg2);border:1px solid var(--line2);border-radius:9px;padding:6px 10px;text-align:center;min-width:62px;}
  .set .w{font-size:16px;font-weight:800;line-height:1;}
  .set .w small{font-size:9px;color:var(--dim);font-weight:600;margin-left:1px;}
  .set .r{font-size:10px;color:var(--accent2);margin-top:3px;letter-spacing:.06em;font-weight:700;}
  .set .sn{font-size:8px;color:var(--dim2);margin-top:3px;letter-spacing:.1em;}

  .editor{margin-top:12px;border-top:1px dashed var(--line2);padding-top:12px;}
  .fld{margin-bottom:10px;}
  .fld label{font-size:9px;color:var(--dim);letter-spacing:.16em;text-transform:uppercase;display:block;margin-bottom:5px;}
  input,select{width:100%;background:var(--bg2);border:1px solid var(--line2);border-radius:9px;
    color:var(--txt);padding:11px 12px;font-size:15px;font-family:inherit;}
  input:focus,select:focus{outline:none;border-color:var(--accent);}
  input[type=date]{-webkit-appearance:none;appearance:none;width:100%;max-width:100%;min-width:0;box-sizing:border-box;}
  input[type=date]::-webkit-date-and-time-value{text-align:left;margin:0;}
  input[type=date]::-webkit-calendar-picker-indicator{margin-left:auto;}
  .setedit{display:flex;gap:7px;align-items:center;margin-bottom:6px;}
  .setedit input{flex:1;}
  .setedit .rm{width:34px;height:40px;flex:none;border:1px solid var(--line2);background:var(--card2);
    border-radius:8px;color:var(--dim);font-size:16px;cursor:pointer;}
  .btnrow{display:flex;gap:8px;margin-top:12px;}
  .btn{flex:1;padding:11px;border-radius:10px;border:1px solid var(--line2);background:var(--card2);
    color:var(--txt);font-size:13px;font-weight:700;cursor:pointer;letter-spacing:.04em;font-family:inherit;}
  .btn.pri{background:linear-gradient(180deg,var(--accent),#941b20);border-color:var(--accent);color:#fff;
    box-shadow:0 4px 16px -6px var(--glow);}
  .btn.dngr{background:transparent;color:var(--accent2);border-color:#4a2528;flex:0 0 auto;padding:11px 16px;}
  .btn.ghost{background:transparent;}
  .btn:active{transform:translateY(1px);}
  .addbtn{width:100%;padding:13px;border-radius:12px;border:1px dashed var(--line2);background:transparent;
    color:var(--dim);font-size:13px;font-weight:700;cursor:pointer;margin-top:6px;letter-spacing:.05em;}
  .addbtn:active{background:var(--card);}

  .screen{min-height:100vh;display:flex;flex-direction:column;justify-content:center;padding:32px 0;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:22px;}
  .card h2{font-size:20px;font-weight:800;letter-spacing:.02em;}
  .card p.lead{font-size:13px;color:var(--dim);margin-top:7px;line-height:1.55;}
  .seg{display:flex;gap:8px;}
  .seg button{flex:1;padding:12px;border-radius:10px;border:1px solid var(--line2);background:var(--bg2);
    color:var(--dim);font-weight:700;font-size:14px;cursor:pointer;font-family:inherit;}
  .seg button.on{background:var(--accent);border-color:var(--accent);color:#fff;}

var LS="omiga_v3";

var DAYS=[

          {k:"deadlift",lift:"Deadlift",sets:[[.9,"3",5],[.95,"1-2"]]}],
  push_b:[{k:"bench",lift:"Bench Press",sets:[[.875,"3"],[.9,"2-4"],[.95,"1-2"]]}],
  legs_b:[{k:"squat",lift:"Back Squat",sets:[[.9,"3",5],[.95,"1-2"]]},

 },

  legs_a:[{k:"squat",lift:"Back Squat",sets:[[.975,"1-4"]],note:"Heavy top set of 1-4 reps. Log weight and reps."},
          {k:"deadlift",lift:"Deadlift",sets:[[.975,"1-4"]],note:"Heavy top set of 1-4 reps. Log weight and reps."}],
  legs_b:[{k:"deadlift",lift:"Deadlift",sets:[[.675,"4"],[.7,"4"],[.725,"2"]],note:"Volume / speed work."}]
 }

var ACC={
 push_a:[["Overhead Dumbbell Press","3 x 8-10 / 2 min / with back support"],
   ["Dumbbell Chest Fly","4 x 12-15 / 90s"],["Lateral Raise","4 x 15-20 / 60s"],

   ["Hamstring Curl","3 x 10-12 / 90s"],["Standing Calf Raise","4 x 12-15 / 60s"],

 push_b:[["Incline Bench Press","4 x 6-10 / 2 min"],["Weighted Dips","4 x 8-10 / 2 min"],
   ["Lateral Raise","4 x 15-20 / 60s"],["Triceps Rope Pressdown","4 x 10-12 / 90s"],
   ["Standing Calf Raise","4 x 12-15 / 60s"],["Crunches","3 x 15-20 / 60s"]],
 pull_b:[["Pull-up","4 x Max / 2 min"],["Cable Row","4 x 10-12 / 2 min"],

   ["Neck Curls / Extensions","2 x 15-20 / 60s"]],
 legs_b:[["Glute Bridge","4 x 10-12 / 2 min"],["Walking Lunge","3 x 12 steps per leg / 2 min"],

   ["Lateral Raise","4 x 15-20 / 60s"],["McGill Big Three","Descending pyramid 5-3-1 / 10s holds"]]
};

function mround(x,m){return Math.round(x/m)*m;}
function computeSets(b,prs,unit){
  var rm=prs[b.k], step=unit==="kg"?2.5:5;
  return b.sets.map(function(s){
    var pct=s[0],reps=s[1],off=s[2]||0;
    var w = pct==null ? null : mround(pct*rm,step)+off;
    return {w:w,reps:reps};
  });
}
function generateProgram(prs,unit){
  var prog={};
  for(var w=1;w<=5;w++){
    prog[w]=DAYS.map(function(d){
      var key=d[0], ex=[];
      (MAIN[w][key]||[]).forEach(function(b,i){
        ex.push({id:"w"+w+"_"+key+"_m"+i,name:b.lift,strength:true,sets:computeSets(b,prs,unit),note:b.note||"",done:false});
      });
      (ACC[key]||[]).forEach(function(a,i){
        ex.push({id:"w"+w+"_"+key+"_a"+i,name:a[0],strength:false,detail:a[1],note:"",done:false});
      });
      return {key:key,name:d[1],sub:d[2],ex:ex};
    });
  }
  return prog;
}

var state=null, view={week:1,day:0,editing:null};
function load(){try{var r=localStorage.getItem(LS);if(r)state=JSON.parse(r);}catch(e){}}
function save(){try{localStorage.setItem(LS,JSON.stringify(state));}catch(e){alert("Could not save to this browser's storage.");}}

function addDays(iso,n){var p=iso.split("-").map(Number);return new Date(p[0],p[1]-1,p[2]+n);}
function dateFor(w,di){return addDays(state.start,(w-1)*7+di);}
function todayMid(){var t=new Date();return new Date(t.getFullYear(),t.getMonth(),t.getDate());}
function sameDay(a,b){return a.getFullYear()==b.getFullYear()&&a.getMonth()==b.getMonth()&&a.getDate()==b.getDate();}
var DOW=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
var MON=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
function fmtDate(d){return DOW[d.getDay()]+" / "+MON[d.getMonth()]+" "+d.getDate();}
function unit(){return state.unit;}

function locateToday(){
  var t=todayMid();
  for(var w=1;w<=6;w++)for(var di=0;di<6;di++){
    if(sameDay(dateFor(w,di),t))return {week:w,day:di};
  }
  return null;
}

var root=document.getElementById("root");
function render(){root.innerHTML="";state?renderApp():renderSetup();}

function renderSetup(){
  var draft={unit:"lb",start:new Date().toISOString().slice(0,10)};
  var scr=el("div","wrap");
  var s=el("div","screen");
  scr.appendChild(s);
  s.innerHTML=
    '<div class="hero"><div class="bigsig"></div>'
    +'<h1>OP: FORGE</h1>'
    +'<div class="tag">6-Week PPL / Candito Strength Engine</div></div>'
    +'<div class="card"><h2>Enter your maxes</h2>'
    +'<p class="lead">Your one-rep maxes drive every core-lift weight across the 6 weeks. You can edit anything later, and it all saves on this phone.</p>'
    +'<div class="fld" style="margin-top:18px"><label>Units</label>'
    +'<div class="seg" id="seg"><button data-u="lb" class="on">Pounds (lb)</button><button data-u="kg">Kilograms (kg)</button></div></div>'
    +'<div class="fld"><label>Bench Press 1RM</label><input id="b" type="number" inputmode="decimal" placeholder="e.g. 225"></div>'
    +'<div class="fld"><label>Squat 1RM</label><input id="s" type="number" inputmode="decimal" placeholder="e.g. 315"></div>'
    +'<div class="fld"><label>Deadlift 1RM</label><input id="d" type="number" inputmode="decimal" placeholder="e.g. 405"></div>'
    +'<div class="fld"><label>Program start date</label><input id="start" type="date" value="'+draft.start+'"></div>'
    +'<div class="btnrow"><button class="btn pri" id="go">Build my program</button></div></div>';
  var segBtns=s.querySelectorAll("#seg button");
  segBtns.forEach(function(b){b.onclick=function(){segBtns.forEach(function(x){x.classList.remove("on");});b.classList.add("on");draft.unit=b.getAttribute("data-u");};});
  $("#go",s).onclick=function(){
    var b=+$("#b",s).value,s2=+$("#s",s).value,d=+$("#d",s).value,st=$("#start",s).value;
    if(!b||!s2||!d){alert("Enter all three maxes to continue.");return;}
    if(!st){alert("Pick a start date.");return;}
    var prs={bench:b,squat:s2,deadlift:d};
    state={unit:draft.unit,prs:prs,start:st,program:generateProgram(prs,draft.unit)};
    save();var t=locateToday();if(t){view.week=t.week;view.day=t.day;}else{view.week=1;view.day=0;}
    render();
  };
  root.appendChild(scr);
}

function renderApp(){
  var wrap=el("div","");
  var head=el("header","");
  var hw=el("div","wrap");
  hw.appendChild(el("div","htop",
    '<div class="brand"><div class="sig"></div><div><h1>OP: FORGE</h1><div class="sub">CANDITO / PUSH PULL LEGS</div></div></div>'
    +'<div class="gear" id="gear">&#9881;</div>'));
  var weeks=el("div","weeks");
  for(var w=1;w<=6;w++){(function(w){
    var p=el("div","wk"+(view.week===w?" on":""));
    p.innerHTML='<div class="n">'+w+'</div><div class="l">'+(w<6?"Week":"Test")+'</div>';
    p.onclick=function(){view.week=w;view.editing=null;render();};
    weeks.appendChild(p);
  })(w);}
  hw.appendChild(weeks);head.appendChild(hw);wrap.appendChild(head);

  var body=el("div","wrap");
  if(view.week===6){body.appendChild(renderWeek6());}
  else{
    var days=el("div","days");
    var t=todayMid();
    DAYS.forEach(function(d,i){
      var isT=sameDay(dateFor(view.week,i),t);
      var p=el("div","day"+(view.day===i?" on":"")+(isT?" today":""),d[1]);
      p.onclick=function(){view.day=i;view.editing=null;render();};
      days.appendChild(p);
    });
    body.appendChild(days);
    body.appendChild(renderDay());
  }
  body.appendChild(el("div","foot","OP: FORGE / SAVED ON THIS DEVICE"));
  wrap.appendChild(body);root.appendChild(wrap);
  $("#gear").onclick=openSettings;
}

function renderDay(){
  var day=state.program[view.week][view.day];
  var c=el("div","");
  var dt=dateFor(view.week,view.day);
  var isT=sameDay(dt,todayMid());
  var dh=el("div","dhead");
  dh.innerHTML='<div class="date">'+fmtDate(dt)+' '+(isT?'<span class="todaytag">TODAY</span>':"")+'</div>'
    +'<h2>'+day.name+'</h2><div class="dsub">'+day.sub+'</div>'
    +'<div class="phase">Week '+view.week+' / '+PHASES[view.week]+'</div>';
  c.appendChild(dh);

  var str=day.ex.filter(function(e){return e.strength;});
  var acc=day.ex.filter(function(e){return !e.strength;});
  if(str.length){
    c.appendChild(el("div","grouplbl str","Compound Lift"));
    str.forEach(function(e){c.appendChild(exCard(e));});
  }
  c.appendChild(el("div","grouplbl","Hypertrophy / Accessories"));
  acc.forEach(function(e){c.appendChild(exCard(e));});

  var add=el("button","addbtn","+  Add exercise");
  add.onclick=function(){
    var id="cst_"+Date.now();
    day.ex.push({id:id,name:"New Exercise",strength:false,detail:"3 x 10",note:"",done:false});
    view.editing=id;save();render();
  };
  c.appendChild(add);
  return c;

function exCard(e){
  var card=el("div","ex"+(e.strength?" str":"")+(e.done?" done":""));
  var row=el("div","exrow");
  var chk=el("div","chk"+(e.done?" on":""),"✓");
  chk.onclick=function(){e.done=!e.done;save();render();};
  row.appendChild(chk);
  var main=el("div","exmain");
  main.innerHTML='<div class="exname">'+escapeHtml(e.name)+(e.strength?'<span class="badge">CORE</span>':"")+'</div>';
  if(e.strength&&e.sets){
    var sets=el("div","sets");
    e.sets.forEach(function(sObj,i){
      var w= sObj.w==null ? '<div class="w">&mdash;</div>' : '<div class="w">'+sObj.w+'<small>'+unit()+'</small></div>';
      sets.appendChild(el("div","set",w+'<div class="r">x '+sObj.reps+'</div><div class="sn">SET '+(i+1)+'</div>'));
    });
    main.appendChild(sets);
  }else if(e.detail){
    main.appendChild(el("div","exdetail",escapeHtml(e.detail)));
  }
  if(e.note)main.appendChild(el("div","exnote",escapeHtml(e.note)));
  row.appendChild(main);
  var ed=el("button","edit","✎");
  ed.onclick=function(){view.editing = view.editing===e.id?null:e.id;render();};
  row.appendChild(ed);
  card.appendChild(row);
  if(view.editing===e.id)card.appendChild(editor(e));
  return card;
}

function field(lbl,html){return el("div","fld","<label>"+lbl+"</label>"+html);}

function editor(e){
  var wrap=el("div","editor");
  wrap.appendChild(field("Exercise name",'<input id="e_name" value="'+escapeAttr(e.name)+'">'));
  var syncFn=null;
  if(e.strength&&e.sets){
    var box=el("div","fld");
    box.appendChild(el("label",null,"Sets — weight ("+unit()+") x reps"));
    var list=el("div","");
    function drawSets(){
      list.innerHTML="";
      e.sets.forEach(function(sObj,i){
        var r=el("div","setedit");
        r.innerHTML='<input data-i="'+i+'" data-f="w" type="number" inputmode="decimal" placeholder="load" value="'+(sObj.w==null?"":sObj.w)+'">'
          +'<input data-i="'+i+'" data-f="r" placeholder="reps" value="'+escapeAttr(String(sObj.reps))+'">';
        var rm=el("button","rm","×");
        rm.onclick=function(){syncInputs();e.sets.splice(i,1);drawSets();};
        r.appendChild(rm);list.appendChild(r);
      });
    }
    function syncInputs(){
      list.querySelectorAll("input").forEach(function(inp){
        var i=+inp.getAttribute("data-i"),f=inp.getAttribute("data-f");
        if(!e.sets[i])return;
        if(f==="w")e.sets[i].w=inp.value===""?null:+inp.value; else e.sets[i].reps=inp.value;
      });
    }
    list.addEventListener("input",syncInputs);
    box.appendChild(list);drawSets();
    var addS=el("button","addbtn","+ Add set");addS.style.marginTop="4px";
    addS.onclick=function(){syncInputs();e.sets.push({w:null,reps:"8"});drawSets();};
    box.appendChild(addS);
    wrap.appendChild(box);
    syncFn=syncInputs;
  }else{
    wrap.appendChild(field("Detail (sets / reps / rest)",'<input id="e_detail" value="'+escapeAttr(e.detail||"")+'">'));
  }
  wrap.appendChild(field("Note (optional)",'<input id="e_note" value="'+escapeAttr(e.note||"")+'">'));
  var br=el("div","btnrow");
  var delBtn=el("button","btn dngr","Delete");
  delBtn.onclick=function(){var day=state.program[view.week][view.day];day.ex=day.ex.filter(function(x){return x.id!==e.id;});view.editing=null;save();render();};
  var saveBtn=el("button","btn pri","Save");
  saveBtn.onclick=function(){
    if(syncFn)syncFn();
    var nm=$("#e_name",wrap).value.trim();if(nm)e.name=nm;
    if($("#e_detail",wrap))e.detail=$("#e_detail",wrap).value;
    e.note=$("#e_note",wrap).value;
    view.editing=null;save();render();
  };
  br.appendChild(delBtn);br.appendChild(saveBtn);
  wrap.appendChild(br);
  return wrap;
}

function renderWeek6(){
  var c=el("div","");
  var dt=dateFor(6,0);
  c.appendChild(el("div","dhead",'<div class="date">'+fmtDate(dt)+' / week 6</div>'
    +'<h2>Test &amp; Reset</h2><div class="dsub">Assess, project your new maxes, restart</div>'));

  var opts=el("div","w6card");
  opts.innerHTML='<h3>Three ways to close the cycle</h3>'
    +'<div class="opt"><span class="on">1</span><span><b>Skip week 6.</b> Use the projected max from your week-5 top sets and start the next cycle.</span></div>'
    +'<div class="opt"><span class="on">2</span><span><b>Deload.</b> Use projected maxes next cycle, but first repeat Week 1 (skip the last upper day).</span></div>'
    +'<div class="opt"><span class="on">3</span><span><b>Test true 1RMs.</b> Work up to a true single on each lift, then deload or restart.</span></div>';
  c.appendChild(opts);

  var calc=el("div","w6card");
  calc.innerHTML='<h3>Projected max calculator</h3>'
    +'<div class="info" style="margin-bottom:14px">Enter the <b>weight</b> and <b>reps</b> you hit on your Week-5 top sets. Projection: x1.03 for 2 reps, x1.06 for 3, x1.09 for 4.</div>';
  var grid=el("div","");
  var step=unit()==="kg"?2.5:5;
  var lifts=[["bench","Bench Press"],["squat","Back Squat"],["deadlift","Deadlift"]];
  lifts.forEach(function(pair){
    var k=pair[0],name=pair[1];
    var def=mround(0.975*state.prs[k],step);
    var g=el("div","calc");
    g.innerHTML='<div><div class="head">'+name+' / weight</div><input type="number" inputmode="decimal" id="w_'+k+'" value="'+def+'"></div>'
      +'<div><div class="head">reps</div><select id="r_'+k+'"><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4" selected>4</option></select></div>'
      +'<div><div class="head">new 1RM</div><div class="result"><div class="pm mono" id="pm_'+k+'">&mdash;</div><div class="inc mono" id="in_'+k+'"></div></div></div>';
    grid.appendChild(g);
  });
  calc.appendChild(grid);
  var mult={1:1,2:1.03,3:1.06,4:1.09};
  function recalc(){
    lifts.forEach(function(pair){
      var k=pair[0];
      var wv=+$("#w_"+k,calc).value||0, r=+$("#r_"+k,calc).value;
      var pm=mround(wv*mult[r],step);
      $("#pm_"+k,calc).textContent=pm?pm+" "+unit():"—";
      var diff=pm-state.prs[k];
      var ie=$("#in_"+k,calc);
      ie.textContent=(diff>0?"+":"")+diff+" "+unit();
      ie.className="inc mono "+(diff>0?"up1":diff<0?"dn1":"");
    });
  }
  calc.addEventListener("input",recalc);
  var apply=el("button","btn pri","Apply as new maxes -> start next cycle");
  apply.style.marginTop="14px";apply.style.width="100%";
  apply.onclick=function(){
    if(!confirm("Set your projected maxes as new 1RMs and regenerate a fresh 6-week cycle starting today? Custom edits will be reset."))return;
    var np={};lifts.forEach(function(pair){var k=pair[0];var wv=+$("#w_"+k,calc).value||0,r=+$("#r_"+k,calc).value;np[k]=mround(wv*mult[r],step)||state.prs[k];});
    state.prs=np;state.start=new Date().toISOString().slice(0,10);
    state.program=generateProgram(np,state.unit);
    save();view.week=1;view.day=0;render();
  };
  calc.appendChild(apply);
  c.appendChild(calc);
  setTimeout(recalc,0);
  return c;
}

function openSettings(){
  var ov=el("div","overlay");
  var sh=el("div","sheet");
  sh.innerHTML='<div class="grabber"></div><h3>Settings</h3><div class="sh-sub">Everything is stored on this device only.</div>';

  var box=el("div","");
  function fld2(l,h){return el("div","fld","<label>"+l+"</label>"+h);}
  box.appendChild(fld2("Units",'<div class="seg" id="u"><button data-u="lb" class="'+(unit()==="lb"?"on":"")+'">lb</button><button data-u="kg" class="'+(unit()==="kg"?"on":"")+'">kg</button></div>'));
  box.appendChild(fld2("Bench 1RM",'<input id="mb" type="number" value="'+state.prs.bench+'">'));
  box.appendChild(fld2("Squat 1RM",'<input id="ms" type="number" value="'+state.prs.squat+'">'));
  box.appendChild(fld2("Deadlift 1RM",'<input id="md" type="number" value="'+state.prs.deadlift+'">'));
  box.appendChild(fld2("Start date",'<input id="mstart" type="date" value="'+state.start+'">'));
  var warn=el("div","info");warn.style.margin="4px 0 4px";
  warn.innerHTML="Regenerating recalculates all core weights from these maxes and <b>resets any custom edits</b>.";
  box.appendChild(warn);
  var br=el("div","btnrow");
  var rb=el("button","btn pri","Regenerate program");
  rb.onclick=function(){
    var b=+$("#mb",sh).value,s=+$("#ms",sh).value,d=+$("#md",sh).value,st=$("#mstart",sh).value;
    if(!b||!s||!d||!st){alert("Fill every field.");return;}
    if(!confirm("Regenerate and reset custom edits?"))return;
    state.prs={bench:b,squat:s,deadlift:d};state.start=st;
    state.program=generateProgram(state.prs,state.unit);
    save();close();var t=locateToday();if(t){view.week=t.week;view.day=t.day;}render();
  };
  br.appendChild(rb);box.appendChild(br);
  sh.appendChild(box);

  var uBtns=sh.querySelectorAll("#u button");
  uBtns.forEach(function(b){b.onclick=function(){uBtns.forEach(function(x){x.classList.remove("on");});b.classList.add("on");state.unit=b.getAttribute("data-u");save();};});

  var dz=el("div","");dz.style.marginTop="20px";
  var reset=el("button","addbtn","Reset everything & re-enter maxes");
  reset.style.borderColor="#4a2528";reset.style.color="var(--accent2)";
  reset.onclick=function(){if(confirm("Erase all data on this device and start over?")){localStorage.removeItem(LS);state=null;close();render();}};
  dz.appendChild(reset);sh.appendChild(dz);

  var done=el("button","btn ghost","Close");done.style.marginTop="12px";done.style.width="100%";
  done.onclick=close;sh.appendChild(done);

  function close(){ov.remove();}
  ov.onclick=function(ev){if(ev.target===ov)close();};
  ov.appendChild(sh);document.body.appendChild(ov);
}

function escapeHtml(s){return String(s).replace(/[&<>]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;"}[c];});}
function escapeAttr(s){return String(s).replace(/"/g,"&quot;").replace(/</g,"&lt;");}

load();
if(state&&state.program){var t0=locateToday();if(t0){view.week=t0.week;view.day=t0.day;}}
render();
</script>
</body>
</html>
